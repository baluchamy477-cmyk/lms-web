<h2>Search Books</h2>

<form method="POST">
    <input type="text" name="keyword" placeholder="Enter book title or author" required>
    <button type="submit">Search</button>
</form>

<hr>

{% if results %}
    <h3>Results:</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
        </tr>

        {% for book in results %}
        <tr>
            <td>{{ book[0] }}</td>
            <td>{{ book[1] }}</td>
            <td>{{ book[3] }}</td>
            <td>{{ book[4] }}</td>
            <td>{{ book[6] }}</td>
        </tr>
        {% endfor %}
    </table>
{% endif %}

<br>
<a href="/dashboard">Back to Dashboard</a>
