<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <form method="POST">
        Email: <input type="email" name="email"><br><br>
        Password: <input type="password" name="password"><br><br>
        <button type="submit">Login</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
